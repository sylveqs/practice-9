<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотечный портал - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">БИБЛИОТЕКА</h1>
            <p class="subtitle">Авторизация читателя</p>
        </div>
        
        <div class="form-container">
            <h2>Вход в систему</h2>
            
            <div id="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Войти в библиотеку</button>
            </form>
            
            <div class="link">
                <p>Еще не зарегистрированы? <a href="register.html">Создать аккаунт</a></p>
            </div>
        </div>
    </div>
    
    <script src="javascript/api.js"></script>
    <script src="javascript/auth.js"></script>
    <script src="javascript/utils.js"></script>
    <script src="javascript/login.js"></script>
</body>
</html>
